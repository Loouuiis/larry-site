services:
  codex-proxy:
    build:
      context: .
      dockerfile: apps/codex-proxy/Dockerfile
    container_name: larry-codex-proxy
    restart: unless-stopped
    environment:
      PORT: 3011
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.2}
      CODEX_REASONING_EFFORT: ${CODEX_REASONING_EFFORT:-low}
      CODEX_TIMEOUT_MS: ${CODEX_TIMEOUT_MS:-120000}
      CODEX_WORKDIR: /workspace
    ports:
      - "3011:3011"
    volumes:
      - ./:/workspace:ro
      - codex_proxy_home:/root/.codex
      - ${HOME}/.codex/auth.json:/root/.codex/auth.json:ro
      - ${HOME}/.codex/config.toml:/root/.codex/config.toml:ro

  postgres:
    image: postgres:18
    container_name: larry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: larry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d larry"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: larry-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    external: true
    name: larry_postgres18_data
  redis_data:
  codex_proxy_home:
