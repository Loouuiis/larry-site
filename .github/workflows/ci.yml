name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Install rollup Linux native (cross-platform lockfile workaround)
        run: npm install @rollup/rollup-linux-x64-gnu --no-save 2>/dev/null || true
      - name: Build shared packages + API
        run: npm run api:build
      - name: Type check worker
        run: npm run worker:build
      - name: Run tests
        run: npm run api:test
